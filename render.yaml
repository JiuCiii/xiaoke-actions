services:
  - type: web
    name: xiaoke-actions
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m xiaoke_actions.server
    envVars:
      - key: NTFY_TOPIC
        sync: false
      - key: DEFAULT_TITLE
        value: Claude
      - key: MAX_MESSAGE_CHARS
        value: "500"
      - key: RATE_LIMIT_PER_HOUR
        value: "6"
      - key: MIN_INTERVAL_SECONDS
        value: "30"
      - key: DEDUPE_WINDOW_SECONDS
        value: "300"
      - key: QUIET_HOURS
        value: ""
      - key: QUIET_MODE
        value: suppress
      - key: TIMEZONE
        value: Asia/Shanghai
      - key: MCP_PATH
        value: /mcp
      - key: STACKCHAN_DEVICE_TOKEN
        sync: false
      - key: STACKCHAN_SPEAK_TTL_SECONDS
        value: "30"
      - key: STACKCHAN_WIGGLE_TTL_SECONDS
        value: "10"
